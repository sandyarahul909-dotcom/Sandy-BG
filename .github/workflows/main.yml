name: Build Sandy BG APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libltdl-dev libffi-dev libssl-dev autoconf automake libtool pkg-config cmake git openjdk-17-jdk
        pip install --upgrade pip
        pip install buildozer cython==0.29.33 kivy

    - name: Auto Accept Android Licenses
      uses: android-actions/setup-android@v3

    - name: Build APK with Buildozer
      run: |
        # ఒకవేళ బిల్డ్ ఫెయిల్ అయితే టాప్ 20 లైన్ల ఎర్రర్లను ఇక్కడే స్క్రీన్ పై చూపించేలా సెటప్ చేసాము
        buildozer -v android debug || (echo "=== TOP 20 BUILD ERRORS ===" && tail -n 20 ~/.buildozer/buildozer.log 2>/dev/null || tail -n 20 config.log 2>/dev/null || echo "Build failed inside buildozer compiler." && exit 1)

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Sandy-BG-APK
        path: bin/*.apk
